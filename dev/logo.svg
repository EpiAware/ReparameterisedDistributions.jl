<?xml version="1.0" encoding="UTF-8"?>
<!-- Logo for ReparameterisedDistributions.jl: the same density curve shown
     under two parameterisations, linked by a conversion arrow, coloured with
     the Julia palette. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300"
     viewBox="0 0 400 300" role="img"
     aria-label="ReparameterisedDistributions.jl logo">
  <title>ReparameterisedDistributions.jl</title>
  <desc>A skewed density curve, drawn once under its native parameters and
    once under its moments, joined by a two-way conversion arrow.</desc>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 40,230 C 70,230 85,120 130,90 C 160,70 175,150 195,230"
          stroke="#4063d8" stroke-width="8"/>
    <path d="M 205,230 C 230,150 245,60 280,50 C 320,38 340,150 360,230"
          stroke="#389826" stroke-width="8"/>
  </g>
  <g stroke="none">
    <circle cx="130" cy="90" r="9" fill="#4063d8"/>
    <circle cx="280" cy="50" r="9" fill="#389826"/>
  </g>
  <g fill="none" stroke="#9558b2" stroke-width="7" stroke-linecap="round">
    <path d="M 155,145 Q 200,110 245,145"/>
    <path d="M 245,155 Q 200,190 155,155"/>
  </g>
  <g fill="#9558b2" stroke="none">
    <path d="M 245,145 L 258,148 L 246,155 Z"/>
    <path d="M 155,155 L 142,152 L 154,145 Z"/>
  </g>
  <line x1="30" y1="230" x2="370" y2="230" stroke="#cb3c33" stroke-width="6"
        stroke-linecap="round"/>
</svg>
